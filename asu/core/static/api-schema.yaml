      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                ResourceWasNotFound:
                  value:
                    status: 404
                    code: not_found
                    message: Not found.
                  summary: resource was not found
          description: ''
  /api/v1/users/{id}/unfollow/:
    post:
      operationId: users_unfollow_create
      summary: Unfollow a user
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - User Follow Operations
      security:
      - oauth2:
        - user.follow:write
      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                ResourceWasNotFound:
                  value:
                    status: 404
                    code: not_found
                    message: Not found.
                  summary: resource was not found
          description: ''
  /api/v1/users/blocked/:
    get:
      operationId: users_blocked_list
      summary: List blocked users
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      tags:
      - User Block Operations
      security:
      - oauth2:
        - user.block:read
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserConnectionList'
          description: ''
  /api/v1/users/by/:
    get:
      operationId: users_by_retrieve
      summary: Retrieve a user by username
      parameters:
      - name: username
        in: query
        required: true
        schema:
          type: string
          minLength: 1
        explode: false
      tags:
      - User Retrieval
      security:
      - oauth2: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                ResourceWasNotFound:
                  value:
                    status: 404
                    code: not_found
                    message: Not found.
                  summary: resource was not found
          description: ''
  /api/v1/users/deactivate/:
    post:
      operationId: users_deactivate_create
      summary: Deactivate authenticated user
      tags:
      - User Settings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDeactivationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserDeactivationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserDeactivationRequest'
        required: true
      security:
      - oauth2: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                BadPassword:
                  value:
                    status: 400
                    code: invalid
                    message: One or more parameters to your request was invalid.
                    errors:
                      password:
                      - message: Your password was not correct.
                        code: invalid
                  summary: bad password
          description: ''
  /api/v1/users/follow-requests/:
    get:
      operationId: users_follow_requests_list
      summary: List follow requests
      parameters:
      - name: cursor
        required: false
        in: query
