      security:
      - oauth2: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserConnectionList'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                ResourceWasNotFound:
                  value:
                    status: 404
                    code: not_found
                    message: Not found.
                  summary: resource was not found
          description: ''
  /api/v1/users/{id}/unblock/:
    post:
      operationId: users_unblock_create
      summary: Unblock a user
      parameters:
      - in: path
