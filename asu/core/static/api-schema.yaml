          writeOnly: true
          minLength: 1
          pattern: ^\d{6}$
      required:
      - code
      - id
    EmailVerificationSendRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    ErrorDetail:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
      required:
      - code
      - message
    Errors:
      type: object
      properties:
        non_field_errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
          description: If errors are not related to specific parameters, this key
            might be present to contain other kinds of errors.
        field_name:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
          description: Contains errors related to `field_name` parameter. Number of
            such keys might vary.
    Follow:
