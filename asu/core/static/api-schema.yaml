              schema:
                $ref: '#/components/schemas/APIError'
          description: ''
  /api/v1/users/profile-picture/:
    put:
      operationId: users_profile_picture_update
      summary: Upload new profile picture
      tags:
      - User Settings
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProfilePictureEditRequest'
        required: true
      security:
      - oauth2: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePictureEdit'
          description: ''
    delete:
      operationId: users_profile_picture_destroy
      summary: Remove profile picture
      tags:
      - User Settings
      security:
      - oauth2: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/users/relations/:
    get:
      operationId: users_relations_retrieve
      summary: List relations with given users
      parameters:
      - name: usernames
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 16
        explode: false
      tags:
      - User Follow Operations
      - User Block Operations
      security:
      - oauth2:
        - user.profile:read
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Relation'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                IdsNotProvided:
                  value:
                    status: 400
                    code: invalid
                    message: One or more parameters to your request was invalid.
                    errors:
                      ids:
                      - message: This field is required.
                        code: invalid
                  summary: ids not provided
                TooManyIds:
                  value:
                    status: 400
                    code: invalid
                    message: One or more parameters to your request was invalid.
                    errors:
                      ids:
                      - message: List contains 51 items, it should contain no more
                          than 50.
                        code: invalid
                  summary: too many ids
          description: ''
  /api/v1/verifications/email/complete/:
