      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                FieldsHaveErrors:
                  value:
                    status: 400
                    code: invalid
                    message: One or more parameters to your request was invalid.
                    errors:
                      code:
                      - message: Please enter a valid code.
                        code: invalid
                  summary: fields have errors
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                ResourceWasNotFound:
                  value:
                    status: 404
                    code: not_found
                    message: Not found.
                  summary: resource was not found
          description: ''
components:
  schemas:
    APIError:
      type: object
      properties:
        status:
          type: integer
          maximum: 599
          minimum: 100
          description: HTTP status code.
        code:
          type: string
          description: A code identifying the class of the error.
        message:
          type: string
          description: Human readable summary of the error.
        errors:
          allOf:
          - $ref: '#/components/schemas/Errors'
          description: A mapping with the keys referencing the given parameters.
      required:
      - code
      - message
      - status
    Auth:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          $ref: '#/components/schemas/TokenTypeEnum'
        expires_in:
          type: integer
        refresh_token:
          type: string
        scope:
          type: string
      required:
      - access_token
      - expires_in
      - refresh_token
      - scope
      - token_type
    AuthRequest:
      type: object
      properties:
        access_token:
          type: string
          minLength: 1
        token_type:
          $ref: '#/components/schemas/TokenTypeEnum'
        expires_in:
          type: integer
        refresh_token:
          type: string
          minLength: 1
        scope:
          type: string
          minLength: 1
      required:
      - access_token
      - expires_in
      - refresh_token
      - scope
      - token_type
