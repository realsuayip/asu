openapi: 3.0.3
info:
  title: asu API
  version: v1
  description: Welcome to asu OpenAPI documentation. Select an endpoint from the sidebar
    to start.
paths:
  /api/v1/users/{id}/:
    get:
      operationId: users_retrieve
      summary: Retrieve a user
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - User Retrieval
      security:
      - oauth2: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                ResourceWasNotFound:
                  value:
                    status: 404
                    code: not_found
                    message: Not found.
                  summary: resource was not found
          description: ''
  /api/v1/users/{id}/block/:
    post:
      operationId: users_block_create
      summary: Block a user
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - User Block Operations
      security:
      - oauth2:
        - user.block:write
      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                ResourceWasNotFound:
                  value:
                    status: 404
                    code: not_found
                    message: Not found.
                  summary: resource was not found
          description: ''
  /api/v1/users/{id}/follow/:
    post:
      operationId: users_follow_create
      description: Depending on the user's choice, this action will either send a
        follow request (if the account is private) or immediately follow the user.
        Request might fail with 403 if the user is not allowed to follow the other
        user (i.e., in case of blocking relations).
      summary: Follow a user
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - User Follow Operations
      security:
      - oauth2:
        - user.follow:write
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Follow'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                ResourceWasNotFound:
                  value:
                    status: 404
                    code: not_found
                    message: Not found.
                  summary: resource was not found
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                AccessToResourceWasDenied:
                  value:
                    status: 403
                    code: permission_denied
                    message: You do not have permission to perform this action.
                  summary: access to resource was denied
          description: ''
  /api/v1/users/{id}/followers/:
    get:
      operationId: users_followers_list
      summary: List followers of a user
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - User Follow Operations
      security:
      - oauth2: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserConnectionList'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                ResourceWasNotFound:
                  value:
                    status: 404
                    code: not_found
                    message: Not found.
                  summary: resource was not found
          description: ''
  /api/v1/users/{id}/following/:
    get:
      operationId: users_following_list
      summary: List follows of a user
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
