  /api/v1/users/me/:
    get:
      operationId: users_me_retrieve
      summary: Retrieve authenticated user
      tags:
      - User Settings
      - User Retrieval
      security:
      - oauth2:
        - user.profile:read
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: users_me_partial_update
      summary: Update authenticated user
      tags:
      - User Settings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - oauth2:
        - user.profile:write
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              examples:
                BadValues:
                  value:
                    status: 400
                    code: invalid
                    message: One or more parameters to your request was invalid.
                    errors:
                      username:
                      - message: This field may not be blank.
                        code: invalid
                      birth_date:
                      - message: 'Date has wrong format. Use one of these formats
                          instead: YYYY-MM-DD.'
                        code: invalid
                      website:
                      - message: Enter a valid URL.
                        code: invalid
                  summary: bad values
          description: ''
  /api/v1/users/password-change/:
