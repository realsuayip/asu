name: asu

volumes:
  pg-data:

services:
  db:
    container_name: asu-postgres
    image: postgres:18.4-trixie@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
    user: postgres
    env_file: ../../conf/dev/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql

  redis:
    container_name: asu-redis
    image: redis:8.6.3-trixie@sha256:4d25e2fe601f7ffaeb4437cb6ced3518bc36edf34ebe98863c80836943d94529
    user: redis

  web:
    container_name: asu-web
    build:
      context: ../..
      dockerfile: docker/dev/dev.Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    extends:
      file: common.yml
      service: python
